<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Road trip Écosse · 10 jours</title>
<style>
  :root{--ink:#1d3033;--slate:#2c474b;--heather:#7c5a86;--heather2:#9b6fa3;--gold:#c9a227;
    --cream:#f6f2e9;--paper:#fbf9f3;--line:#dfd6c4;--warn:#b4541f;--sea:#d4e2e4;--land:#efe8d7;--lands:#bcae90;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:var(--sea)}
  .serif{font-family:Georgia,"Times New Roman",serif}
  #wrap{position:absolute;inset:0;overflow:hidden;background:linear-gradient(160deg,#dbe7e8,#c6d8da)}
  svg#map{position:absolute;inset:0;width:100%;height:100%;touch-action:none;display:block}
  #land path{fill:var(--land);stroke:var(--lands);stroke-width:1;vector-effect:non-scaling-stroke}
  .route{fill:none;stroke:var(--heather);stroke-width:3;stroke-dasharray:2 8;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
  .mk{cursor:pointer}
  .mk text{font-family:-apple-system,Roboto,sans-serif;font-weight:700;fill:#fff}

  #header{position:absolute;top:0;left:0;right:0;z-index:30;pointer-events:none;
    background:linear-gradient(180deg,rgba(29,48,51,.96),rgba(29,48,51,.72) 70%,rgba(29,48,51,0));
    padding:12px 16px 30px;color:var(--cream)}
  #header h1{margin:0;font-size:19px;font-weight:600}
  #header .sub{margin-top:2px;font-size:12.5px;opacity:.85}

  #stagesBtn{position:absolute;z-index:31;right:12px;top:12px;background:var(--paper);color:var(--ink);
    border:1px solid var(--line);border-radius:24px;padding:8px 14px;font-size:13px;font-weight:600;box-shadow:0 4px 14px rgba(0,0,0,.25)}
  #panel{position:absolute;z-index:32;right:12px;top:54px;width:230px;max-width:78vw;background:var(--paper);
    border:1px solid var(--line);border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.3);overflow:hidden;display:none}
  #panel.open{display:block}
  #panel .ph{padding:10px 14px;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--heather);border-bottom:1px solid var(--line);font-weight:700}
  #panel ul{list-style:none;margin:0;padding:6px}
  #panel li{padding:9px 10px;border-radius:9px;display:flex;gap:10px;align-items:center}
  #panel li:active{background:#efe9dc}
  #panel li .num{width:24px;height:24px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:700;background:linear-gradient(140deg,var(--heather),var(--heather2))}
  #panel li .nm{font-size:13.5px;font-weight:600;line-height:1.15}
  #panel li .ng{font-size:11px;color:#7a7466}

  #zoom{position:absolute;z-index:31;right:12px;bottom:120px;display:flex;flex-direction:column;gap:1px;border-radius:11px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.25)}
  #zoom button{width:42px;height:42px;border:0;background:var(--paper);color:var(--ink);font-size:22px;font-weight:600}
  #zoom button:active{background:#e7e0d0}

  #legend{position:absolute;z-index:31;left:12px;bottom:14px;background:rgba(251,249,243,.95);border:1px solid var(--line);border-radius:11px;padding:9px 12px;font-size:11.5px;box-shadow:0 4px 14px rgba(0,0,0,.22)}
  #legend .row{display:flex;align-items:center;gap:8px;margin:3px 0}
  #legend .dot{width:13px;height:13px;border-radius:50%;border:2px solid #fff;flex:0 0 auto}
  #legend .d1{background:linear-gradient(140deg,var(--heather),var(--heather2))}
  #legend .d2{background:var(--gold)}
  #legend .d3{width:18px;height:0;border:0;border-top:3px dashed var(--heather)}

  #scrim{position:absolute;inset:0;z-index:40;background:rgba(20,30,32,.4);opacity:0;visibility:hidden;transition:opacity .2s}
  #scrim.show{opacity:1;visibility:visible}
  #sheet{position:absolute;left:0;right:0;bottom:0;z-index:41;background:var(--paper);border-radius:18px 18px 0 0;
    box-shadow:0 -10px 40px rgba(0,0,0,.35);transform:translateY(102%);transition:transform .26s cubic-bezier(.2,.7,.2,1);max-height:86vh;display:flex;flex-direction:column}
  #sheet.show{transform:translateY(0)}
  #sheet .grab{width:40px;height:4px;border-radius:3px;background:#cabfa6;margin:8px auto 6px}
  #hero{position:relative;height:148px;margin:0;overflow:hidden}
  #hero svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  #hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2}
  #hero.clk{cursor:pointer}
  #hero a.heroa{position:absolute;inset:0;z-index:4;display:block}
  #hero .cap{position:absolute;left:12px;bottom:9px;z-index:3;font-size:10px;letter-spacing:.6px;text-transform:uppercase;
    color:#fff;background:rgba(20,30,32,.45);padding:3px 9px;border-radius:20px;backdrop-filter:blur(2px)}
  #hero .grad{position:absolute;inset:0;z-index:3;background:linear-gradient(180deg,rgba(20,30,32,.35),rgba(20,30,32,0) 38%)}
  #sheet .top{padding:11px 18px 13px;color:#fff;background:linear-gradient(135deg,var(--slate),var(--ink));position:relative}
  #sheet .top.warn{background:linear-gradient(135deg,var(--warn),#7a3210)}
  #sheet .top .k{font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;opacity:.82}
  #sheet .top h3{margin:3px 0 0;font-size:19px;font-weight:600}
  #sheet .top .n{display:inline-block;margin-top:7px;font-size:11px;font-weight:700;background:rgba(255,255,255,.16);padding:2px 10px;border-radius:20px}
  #sheet .close{position:absolute;right:12px;top:11px;width:30px;height:30px;border-radius:50%;border:0;background:rgba(255,255,255,.18);color:#fff;font-size:17px}
  #sheet .body{padding:14px 18px 28px;overflow-y:auto;font-size:13.5px;line-height:1.5;-webkit-overflow-scrolling:touch}
  #sheet .body p{margin:0 0 9px}
  #sheet .body h4{margin:13px 0 4px;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--heather);font-weight:700}
  #sheet .body h4:first-child{margin-top:0}
  #sheet .body ul{margin:0;padding-left:17px}
  #sheet .body li{margin:3px 0}
  #sheet .body b{font-weight:600}
  #sheet .body .tip{background:#efe9dc;border-left:3px solid var(--gold);padding:8px 11px;border-radius:0 8px 8px 0;font-size:12.5px;margin-top:9px}
  #sheet .body .warn{background:#f6e4d8;border-left:3px solid var(--warn);padding:8px 11px;border-radius:0 8px 8px 0;font-size:12.5px;margin-top:9px;color:#7a3210}
</style>
</head>

</div>

<div id="scrim"></div>
<div id="sheet">

  <div id="hero"></div>

</div>

const PJ = DATA.proj;
function proj(lat,lng){ return [ (lng-PJ.LON0)*PJ.cos*PJ.k, (PJ.LAT1-lat)*PJ.k ]; }

const PAL={
 dusk:{sky:['#33406a','#7d6a9c','#f3c884'],sun:'#ffe1a8',sil:'#1a2430',water:'#41507a'},

function ridge(apex,base,fill,op){const pts=[[apex[0][0],base],...apex,[apex[apex.length-1][0],base]];
 return `<polygon points="${pts.map(p=>p.join(',')).join(' ')}" fill="${fill}" opacity="${op}"/>`;}
function poly(pts,fill,op){return `<polygon points="${pts.map(p=>p.join(',')).join(' ')}" fill="${fill}"${op!=null?` opacity="${op}"`:''}/>`;}
function motif(m,p){
 if(m==='peaks') return ridge([[0,138],[40,116],[90,126],[140,103],[190,118],[240,106],[300,120],[360,108],[400,138]],140,p.sil,.30)
   +ridge([[0,168],[55,138],[110,156],[170,130],[230,148],[290,136],[350,154],[400,168]],168,p.sil,.55)
   +ridge([[0,200],[60,150],[120,176],[185,118],[250,166],[315,140],[400,200]],200,p.sil,1);
 if(m==='pinnacles'){let w=`<rect x="0" y="150" width="400" height="50" fill="${p.water}"/>`
   +ridge([[0,150],[80,132],[160,146],[240,130],[320,148],[400,134]],150,p.sil,.40);
   let mound=ridge([[55,150],[110,122],[160,130],[215,112],[265,150]],150,p.sil,1);
   let pins=poly([[150,130],[156,72],[163,130]],p.sil)+poly([[176,122],[185,54],[194,122]],p.sil)+poly([[206,126],[212,80],[219,126]],p.sil);
   let refl=`<rect x="150" y="150" width="2" height="34" fill="#fff" opacity=".1"/><rect x="184" y="150" width="2" height="40" fill="#fff" opacity=".1"/>`;
   return w+mound+pins+refl;}
 if(m==='lighthouse'){let w=`<rect x="0" y="146" width="400" height="54" fill="${p.water}"/>`
   +ridge([[0,146],[70,134],[150,142],[230,132],[400,144]],146,p.sil,.38);
   let cliff=poly([[250,200],[262,150],[300,118],[342,128],[400,150],[400,200]],p.sil);
   let beam=poly([[300,80],[196,42],[196,120]],'#ffe6a0',.13);
   let tower=`<polygon points="293,150 295,84 305,84 307,150" fill="#f1ead9" stroke="${p.sil}" stroke-width="1.4"/>`
     +`<rect x="293.5" y="103" width="13" height="7" fill="#b4541f"/><rect x="294" y="120" width="12" height="7" fill="#b4541f"/>`
     +`<rect x="294" y="74" width="12" height="11" fill="${p.sil}"/><circle cx="300" cy="80" r="5.5" fill="#ffe6a0"/>`;
   return w+cliff+beam+tower;}
 if(m==='castleCrag'){let town='';for(let i=0;i<7;i++){let x=4+i*17,h=14+((i*53)%18);town+=`<rect x="${x}" y="${200-h}" width="13" height="${h}" fill="${p.sil}"/>`;
     if(i%2)town+=poly([[x+2,200-h],[x+6.5,200-h-9],[x+11,200-h]],p.sil);}
   let crag=poly([[118,200],[150,150],[182,120],[212,107],[252,117],[292,150],[322,200]],p.sil);
   let castle=`<rect x="186" y="90" width="22" height="24" fill="${p.sil}"/><rect x="212" y="80" width="16" height="34" fill="${p.sil}"/>`
     +poly([[212,80],[220,68],[228,80]],p.sil)+`<rect x="184" y="86" width="4" height="6" fill="${p.sil}"/><rect x="194" y="86" width="4" height="6" fill="${p.sil}"/><rect x="204" y="86" width="4" height="6" fill="${p.sil}"/>`
     +`<rect x="196" y="98" width="4" height="5" fill="#ffd27a"/><rect x="217" y="92" width="4" height="6" fill="#ffd27a"/>`;
   return town+crag+castle;}
 if(m==='castleIslet'){let w=`<rect x="0" y="140" width="400" height="60" fill="${p.water}"/>`
   +ridge([[0,140],[90,124],[180,134],[280,122],[400,136]],140,p.sil,.38);
   let isle=`<ellipse cx="180" cy="158" rx="74" ry="11" fill="${p.sil}"/>`;
   let castle=`<rect x="156" y="124" width="16" height="30" fill="${p.sil}"/><rect x="176" y="116" width="20" height="38" fill="${p.sil}"/>`
     +`<rect x="200" y="128" width="13" height="26" fill="${p.sil}"/><rect x="184" y="108" width="5" height="9" fill="${p.sil}"/>`
     +`<rect x="180" y="130" width="3" height="5" fill="#ffd27a"/><rect x="201" y="136" width="3" height="5" fill="#ffd27a"/>`;
   let bridge='';for(let i=0;i<5;i++){let x=250+i*22;bridge+=`<path d="M${x} 156 q11 -11 22 0" fill="none" stroke="${p.sil}" stroke-width="3"/>`;}
   let refl=`<g opacity=".18"><rect x="176" y="160" width="20" height="22" fill="${p.sil}"/></g>`;
   return w+isle+castle+bridge+refl;}
 if(m==='viaduct'){let back=ridge([[0,150],[80,120],[170,140],[260,116],[360,138],[400,128]],160,p.sil,.4);
   let ground=`<rect x="0" y="160" width="400" height="40" fill="${p.sil}"/>`;
   let wall=`<rect x="34" y="124" width="332" height="38" fill="${p.sil}"/>`;
   let arch='';for(let i=0;i<7;i++){let x=46+i*45;arch+=poly([[x,162],[x,144]],null);
     arch+=`<path d="M${x} 162 L${x} 144 Q${x+18} 127 ${x+36} 144 L${x+36} 162 Z" fill="${p.sky[2]}"/>`;}
   let train=`<rect x="58" y="115" width="50" height="9" rx="2" fill="#241d24"/>`
     +`<circle cx="70" cy="110" r="4" fill="#fff" opacity=".55"/><circle cx="80" cy="106" r="5" fill="#fff" opacity=".4"/><circle cx="92" cy="104" r="6" fill="#fff" opacity=".3"/>`;
   return back+ground+wall+arch+train;}
 if(m==='calmLoch'){let hills=ridge([[0,124],[70,108],[150,120],[240,104],[330,118],[400,110]],132,p.sil,.4)
   +ridge([[0,134],[90,122],[200,132],[300,120],[400,130]],138,p.sil,.62);
   let w=`<rect x="0" y="138" width="400" height="62" fill="${p.water}"/>`;
   let shimmer='';for(let i=0;i<5;i++)shimmer+=`<rect x="${30+i*70}" y="${150+i*8}" width="${40-i*4}" height="2" fill="#fff" opacity=".12"/>`;
   let isle=`<ellipse cx="142" cy="150" rx="28" ry="6" fill="${p.sil}"/><rect x="140" y="138" width="3" height="12" fill="${p.sil}"/><circle cx="141.5" cy="135" r="6" fill="${p.sil}"/>`;
   let boat=`<path d="M252 156 l20 0 l-3 7 l-14 0 z" fill="${p.sil}"/><rect x="261" y="142" width="1.6" height="14" fill="${p.sil}"/><path d="M262.6 143 l9 9 l-9 0 z" fill="${p.sil}"/>`;
   return hills+w+shimmer+isle+boat;}
 return ridge([[0,200],[200,120],[400,200]],200,p.sil,1);
}
let _u=0;
function sceneSVG(m,palName){const p=PAL[palName]||PAL.dusk;const id='s'+(_u++);
 const sky=`<defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${p.sky[0]}"/><stop offset=".55" stop-color="${p.sky[1]}"/><stop offset="1" stop-color="${p.sky[2]}"/></linearGradient></defs>`
  +`<rect x="0" y="0" width="400" height="200" fill="url(#${id})"/>`;
 const sun=`<circle cx="312" cy="52" r="23" fill="${p.sun}" opacity=".88"/>`;
 const mist=`<rect x="0" y="116" width="400" height="20" fill="#fff" opacity=".13"/>`;
 const birds=`<path d="M44 46 q6 -5 12 0 q6 -5 12 0 M70 54 q5 -4 10 0 q5 -4 10 0" stroke="${p.sil}" stroke-width="1.5" fill="none" opacity=".45"/>`;
 return `<svg viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">${sky}${sun}${mist}${motif(m,p)}${birds}</svg>`;
}

const markerEls=[];
function addMarker(x,y,builder,rec){const g=document.createElementNS(SVG,'g');g.setAttribute('class','mk');builder(g);
 g.addEventListener('click',()=>{if(!dragged)openSheet(rec);});gMk.appendChild(g);markerEls.push({el:g,x,y});}

 {k:'Sur le trajet',title:s.name,n:'',html:'<p style="margin:0">'+s.t+'</p>',warn:false,scene:s.scene,photo:s.photo});});

 addMarker(x,y,g=>{const w=b.label.length*11+34,h=26;const r=document.createElementNS(SVG,'rect');
   r.setAttribute('x',-w/2);r.setAttribute('y',-h/2);r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('rx',13);

   g.appendChild(r);g.appendChild(t);},

DATA.stages.forEach(s=>{const[x,y]=proj(s.lat,s.lng);

 lg.setAttribute('x1','0');lg.setAttribute('y1','0');lg.setAttribute('x2','1');lg.setAttribute('y2','1');
 const a=document.createElementNS(SVG,'stop');a.setAttribute('offset','0');a.setAttribute('stop-color','#7c5a86');
 const b=document.createElementNS(SVG,'stop');b.setAttribute('offset','1');b.setAttribute('stop-color','#9b6fa3');
 lg.appendChild(a);lg.appendChild(b);defs.appendChild(lg);});
svg.insertBefore(defs,gLand);

/* ===== vue ===== */
function rect(){return svg.getBoundingClientRect();}
let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
[...DATA.stages,...DATA.sites,...DATA.badges].forEach(o=>{const[x,y]=proj(o.lat,o.lng);minx=Math.min(minx,x);maxx=Math.max(maxx,x);miny=Math.min(miny,y);maxy=Math.max(maxy,y);});
DATA.segments.forEach(seg=>seg.forEach(c=>{const[x,y]=proj(c[0],c[1]);minx=Math.min(minx,x);maxx=Math.max(maxx,x);miny=Math.min(miny,y);maxy=Math.max(maxy,y);}));
let vb={x:0,y:0,w:0,h:0},VB0W=0,MINW,MAXW;
function setAspect(){const r=rect();const ar=r.width/r.height;let cx=(minx+maxx)/2,cy=(miny+maxy)/2;
 let w=(maxx-minx)*1.18,h=(maxy-miny)*1.18*1.12;if(w/h<ar){w=h*ar;}else{h=w/ar;}
 vb={x:cx-w/2,y:cy-h/2,w,h};VB0W=w;MINW=w*0.18;MAXW=w*1.7;}
function applyView(){svg.setAttribute('viewBox',vb.x+' '+vb.y+' '+vb.w+' '+vb.h);const s=vb.w/VB0W;
 markerEls.forEach(m=>{m.el.setAttribute('transform','translate('+m.x+' '+m.y+') scale('+s+')');});}
function init(){setAspect();applyView();}
window.addEventListener('resize',()=>{setAspect();applyView();});

const pts=new Map();let dragged=false,startVB=null,startMid=null,startDist=0,startPx=null;
svg.addEventListener('pointerdown',e=>{svg.setPointerCapture(e.pointerId);pts.set(e.pointerId,{x:e.clientX,y:e.clientY});dragged=false;
 if(pts.size===1){startVB={...vb};startPx={x:e.clientX,y:e.clientY};}
 if(pts.size===2){const a=[...pts.values()];startVB={...vb};startDist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);startMid={x:(a[0].x+a[1].x)/2,y:(a[0].y+a[1].y)/2};}});
svg.addEventListener('pointermove',e=>{if(!pts.has(e.pointerId))return;pts.set(e.pointerId,{x:e.clientX,y:e.clientY});const r=rect();
 if(pts.size===2&&startVB){const a=[...pts.values()];const dist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);let f=startDist/dist;
   let nw=Math.min(MAXW,Math.max(MINW,startVB.w*f));f=nw/startVB.w;
   const fx=startVB.x+(startMid.x-r.left)/r.width*startVB.w,fy=startVB.y+(startMid.y-r.top)/r.height*startVB.h;
   vb.w=nw;vb.h=startVB.h*f;vb.x=fx-(startMid.x-r.left)/r.width*vb.w;vb.y=fy-(startMid.y-r.top)/r.height*vb.h;dragged=true;applyView();}
 else if(pts.size===1&&startVB){const dx=e.clientX-startPx.x,dy=e.clientY-startPx.y;if(Math.abs(dx)+Math.abs(dy)>4)dragged=true;
   const upp=startVB.w/r.width;vb.x=startVB.x-dx*upp;vb.y=startVB.y-dy*upp;applyView();}});
function up(e){if(pts.has(e.pointerId))pts.delete(e.pointerId);if(pts.size===1){const p=[...pts.values()][0];startVB={...vb};startPx={x:p.x,y:p.y};}}
svg.addEventListener('pointerup',up);svg.addEventListener('pointercancel',up);
svg.addEventListener('wheel',e=>{e.preventDefault();const r=rect();let f=e.deltaY>0?1.12:0.89;let nw=Math.min(MAXW,Math.max(MINW,vb.w*f));f=nw/vb.w;
 const fx=vb.x+(e.clientX-r.left)/r.width*vb.w,fy=vb.y+(e.clientY-r.top)/r.height*vb.h;
 vb.w=nw;vb.h=vb.h*f;vb.x=fx-(e.clientX-r.left)/r.width*vb.w;vb.y=fy-(e.clientY-r.top)/r.height*vb.h;applyView();},{passive:false});
function zoomCenter(f){const nw=Math.min(MAXW,Math.max(MINW,vb.w*f));const ff=nw/vb.w;const cx=vb.x+vb.w/2,cy=vb.y+vb.h/2;vb.w=nw;vb.h=vb.h*ff;vb.x=cx-vb.w/2;vb.y=cy-vb.h/2;applyView();}
document.getElementById('zin').onclick=()=>zoomCenter(0.7);
document.getElementById('zout').onclick=()=>zoomCenter(1.43);
function flyTo(lat,lng){const[x,y]=proj(lat,lng);const nw=Math.max(MINW,VB0W*0.42);vb.h=nw*(vb.h/vb.w);vb.w=nw;vb.x=x-vb.w/2;vb.y=y-vb.h/2;applyView();}

/* ===== fiche ===== */
const scrim=document.getElementById('scrim'),sheet=document.getElementById('sheet'),hero=document.getElementById('hero');
function openSheet(rec){
 document.getElementById('sheetK').textContent=rec.k;
 document.getElementById('sheetTitle').textContent=rec.title;
 const nEl=document.getElementById('sheetN');nEl.textContent=rec.n||'';nEl.style.display=rec.n?'inline-block':'none';
 document.getElementById('sheetTop').className='top'+(rec.warn?' warn':'');
 document.getElementById('sheetBody').innerHTML=rec.html;
 const hasPhoto=!!rec.photo;
 const cap=hasPhoto?'photo':'illustration';
 hero.innerHTML=sceneSVG(rec.scene.m,rec.scene.p)+'<div class="grad"></div><span class="cap">'+cap+'</span>';
 if(hasPhoto){const img=new Image();img.onload=()=>{hero.insertBefore(img,hero.querySelector('.grad'));};img.onerror=()=>{const c=hero.querySelector('.cap');if(c)c.textContent='illustration';};img.src=rec.photo;img.alt='';}
 document.getElementById('sheetBody').scrollTop=0;
 scrim.classList.add('show');sheet.classList.add('show');
}
function closeSheet(){scrim.classList.remove('show');sheet.classList.remove('show');}
document.getElementById('sheetClose').onclick=closeSheet;scrim.onclick=closeSheet;

const list=document.getElementById('stageList'),panel=document.getElementById('panel');
DATA.stages.forEach(s=>{const li=document.createElement('li');
 li.innerHTML='<span class="num">'+s.n+'</span><span><span class="nm">'+s.name+'</span><br><span class="ng">'+s.nights+'</span></span>';
 li.onclick=()=>{panel.classList.remove('open');flyTo(s.lat,s.lng);
   setTimeout(()=>openSheet({k:'Étape '+s.n+' · '+s.k,title:s.name,n:s.nights,html:s.html,warn:false,scene:s.scene,photo:s.photo}),260);};
 list.appendChild(li);});
document.getElementById('stagesBtn').onclick=()=>panel.classList.toggle('open');

requestAnimationFrame(init);
</script>
</body>
